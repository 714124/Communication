<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>おしゃべりボード</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .category-tab.active {
            filter: brightness(0.9);
            border-color: #3b82f6;
            transform: translateY(2px);
        }
        .kana-grid-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            direction: rtl;
            gap: 8px;
        }
        .kana-col {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .kana-key {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 0.75rem;
            box-shadow: 0 2px 0 rgba(0,0,0,0.1);
            direction: ltr;
        }
        .kana-key:active { background-color: #dbeafe; transform: translateY(2px); box-shadow: none; }
        .phrase-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.25rem;
            margin: 4px;
            border: 2px solid rgba(0,0,0,0.1);
            animation: popIn 0.2s ease-out;
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- ヘッダー：メッセージ表示 -->
    <header class="bg-white shadow-md p-4 flex flex-col gap-3 z-10">
        <!-- 表示エリア（タグ形式） -->
        <div class="flex items-center gap-2">
            <div id="display-area" 
                 class="flex-1 min-h-[80px] p-2 border-2 border-blue-200 rounded-xl bg-gray-50 flex flex-wrap content-start overflow-y-auto max-h-[160px]">
                <!-- ここにタグが追加される -->
            </div>
            <button onclick="clearAll()" class="bg-red-100 text-red-600 px-4 py-8 rounded-xl hover:bg-red-200 transition-colors font-bold text-lg leading-tight">
                ぜんぶ<br>けす
            </button>
        </div>
        
        <button onclick="speakAll()" class="w-full bg-blue-600 text-white text-3xl font-bold py-5 rounded-2xl shadow-lg active:bg-blue-800 transition-all flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            こえで だす
        </button>
    </header>

    <!-- 操作パネル：カテゴリータブ -->
    <div class="bg-gray-50 border-b border-gray-200">
        <nav id="category-container" class="flex overflow-x-auto p-4 gap-2 no-scrollbar">
            <!-- JSで動的に生成 -->
        </nav>
    </div>

    <!-- メインコンテンツ -->
    <main class="flex-1 overflow-y-auto p-4 relative">
        <div id="content-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 pb-20">
            <!-- JSで動的に生成 -->
        </div>

        <!-- 五十音キーボード -->
        <div id="kana-keyboard" class="hidden bg-white p-4 rounded-2xl shadow-2xl border-2 border-blue-100 max-w-4xl mx-auto">
            <div class="flex justify-between mb-4 items-center">
                <h3 class="text-xl font-bold text-blue-600">もじを えらぶ</h3>
                <div class="flex gap-2">
                    <button onclick="toggleKeyboardMode('standard')" id="mode-std" class="px-6 py-2 bg-blue-600 text-white rounded-full font-bold">せいおん</button>
                    <button onclick="toggleKeyboardMode('dakuon')" id="mode-daku" class="px-6 py-2 bg-gray-200 rounded-full font-bold">にごるおん</button>
                    <button onclick="toggleKeyboard(false)" class="text-gray-400 font-bold p-2 ml-4">✕ とじる</button>
                </div>
            </div>
            
            <div class="kana-grid-container mb-6" id="kana-grid"></div>

            <div class="grid grid-cols-4 gap-3">
                <button onclick="addChar(' ')" class="bg-gray-100 p-5 rounded-xl font-bold text-xl">あき</button>
                <button onclick="removeLastTag()" class="bg-orange-100 text-orange-700 p-5 rounded-xl font-bold text-xl">1つ けす</button>
                <button onclick="speakAll()" class="bg-blue-600 text-white p-5 rounded-xl font-bold text-2xl col-span-2 shadow-md active:bg-blue-800">はなす</button>
            </div>
        </div>
    </main>

    <!-- フッター -->
    <footer class="bg-white p-4 border-t border-gray-200">
        <button id="keyboard-toggle-btn" onclick="toggleKeyboard(true)" class="w-full bg-green-500 text-white text-2xl font-bold py-5 rounded-xl shadow-md active:bg-green-600 flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            もじで にゅうりょく する
        </button>
    </footer>

    <!-- 先生の名前編集用モーダル -->
    <div id="voice-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
            <h4 class="text-xl font-bold mb-4">せんせいの なまえを かえる</h4>
            <input type="text" id="voice-name-input" class="w-full p-3 border-2 border-blue-200 rounded-xl mb-4 text-lg">
            <div class="flex gap-2">
                <button onclick="closeVoiceModal()" class="flex-1 py-3 bg-gray-200 rounded-xl font-bold">やめる</button>
                <button onclick="saveVoiceName()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">きめる</button>
            </div>
        </div>
    </div>

    <script>
        const categories = [
            { id: 'teacher', name: 'せんせい', color: 'bg-blue-500', textBtn: 'bg-blue-100 border-blue-200' },
            { id: 'greet', name: 'あいさつ', color: 'bg-orange-400', textBtn: 'bg-orange-50 border-orange-200' },
            { id: 'toilet', name: 'トイレ', color: 'bg-teal-500', textBtn: 'bg-teal-50 border-teal-200' },
            { id: 'food', name: 'たべもの', color: 'bg-yellow-400', textBtn: 'bg-yellow-50 border-yellow-200' },
            { id: 'request', name: 'おねがい', color: 'bg-indigo-400', textBtn: 'bg-indigo-50 border-indigo-200' },
            { id: 'feel', name: 'きもち', color: 'bg-pink-400', textBtn: 'bg-pink-50 border-pink-200' },
            { id: 'body', name: 'からだ', color: 'bg-green-400', textBtn: 'bg-green-50 border-green-200' }
        ];

        const phrases = [
            { cat: 'greet', text: 'おはよう', icon: '☀️' },
            { cat: 'greet', text: 'こんにちは', icon: '😊' },
            { cat: 'greet', text: 'ありがとう', icon: '🙏' },
            { cat: 'greet', text: 'すみません', icon: '🙇‍♂️' },
            { cat: 'toilet', text: 'トイレ', icon: '🚻' },
            { cat: 'toilet', text: 'おしっこ', icon: '💧' },
            { cat: 'toilet', text: 'うんち', icon: '💩' },
            { cat: 'toilet', text: 'おむつ', icon: '👶' },
            { cat: 'toilet', text: 'かえて', icon: '🔄' },
            { cat: 'toilet', text: 'ふきたい', icon: '🧻' },
            { cat: 'food', text: 'ごはん', icon: '🍚' },
            { cat: 'food', text: 'おちゃ', icon: '🍵' },
            { cat: 'food', text: 'おかし', icon: '🍪' },
            { cat: 'food', text: 'ぱん', icon: '🍞' },
            { cat: 'request', text: 'を', icon: '🔗' },
            { cat: 'request', text: 'に', icon: '🔗' },
            { cat: 'request', text: 'いきたい', icon: '🏃‍♂️' },
            { cat: 'request', text: 'たべたい', icon: '😋' },
            { cat: 'request', text: 'のみたい', icon: '🥤' },
            { cat: 'request', text: 'てつだって', icon: '🤝' },
            { cat: 'feel', text: 'うれしい', icon: '✨' },
            { cat: 'feel', text: 'かなしい', icon: '😢' },
            { cat: 'feel', text: 'つかれた', icon: '😫' },
            { cat: 'body', text: 'あたま', icon: '👤' },
            { cat: 'body', text: 'め', icon: '👁️' },
            { cat: 'body', text: 'みみ', icon: '👂' },
            { cat: 'body', text: 'はな', icon: '👃' },
            { cat: 'body', text: 'くち', icon: '👄' },
            { cat: 'body', text: 'て', icon: '✋' },
            { cat: 'body', text: 'あし', icon: '👣' },
            { cat: 'body', text: 'おなか', icon: '🥯' },
            { cat: 'body', text: 'いたい', icon: '⚡' },
            { cat: 'body', text: 'かゆい', icon: '🐜' }
        ];

        const kanaStandard = [
            ['あ','い','う','え','お'], ['か','き','く','け','こ'],
            ['さ','し','す','せ','そ'], ['た','ち','つ','て','と'],
            ['な','に','ぬ','ね','の'], ['は','ひ','ふ','へ','ほ'],
            ['ま','み','む','め','も'], ['や','ゆ','よ'],
            ['ら','り','る','れ','ろ'], ['わ','を','ん']
        ];

        const kanaDakuon = [
            ['が','ぎ','ぐ','げ','ご'], ['ざ','じ','ず','ぜ','ぞ'],
            ['だ','ぢ','づ','で','ど'], ['ば','び','ぶ','べ','ぼ'],
            ['ぱ','ぴ','ぷ','ぺ','ぽ']
        ];

        let currentCategoryId = 'teacher';
        let keyboardMode = 'standard';
        let voices = [];
        let selectedVoiceIndex = 0;
        let customVoiceNames = {};
        let editingVoiceIndex = null;
        let selectedPhrases = []; 

        function init() {
            loadVoices();
            renderCategories();
            renderContent();
            renderKana();
        }

        function loadVoices() {
            voices = window.speechSynthesis.getVoices().filter(v => v.lang.includes('ja'));
            if (voices.length > 0 && currentCategoryId === 'teacher') {
                renderContent();
            }
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;

        function getDefaultName(v, i) {
            if (v.name.includes('Nanako')) return "ななこ せんせい";
            if (v.name.includes('Keita')) return "けいた せんせい";
            if (v.name.includes('Kyoko')) return "きょうこ せんせい";
            return (v.name.includes('Female') || v.name.includes('female')) ? `おんなの せんせい ${i+1}` : `おとこの せんせい ${i+1}`;
        }

        function renderCategories() {
            const container = document.getElementById('category-container');
            container.innerHTML = categories.map(cat => `
                <button onclick="setCategory('${cat.id}')" 
                        class="category-tab whitespace-nowrap px-8 py-4 rounded-xl border-b-4 border-black/20 font-bold text-xl text-white transition-all
                        ${cat.id === currentCategoryId ? 'active scale-105 shadow-inner' : 'opacity-80'} ${cat.color}">
                    ${cat.name}
                </button>
            `).join('');
        }

        function setCategory(id) {
            currentCategoryId = id;
            toggleKeyboard(false);
            renderCategories();
            renderContent();
        }

        function renderContent() {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = '';

            if (currentCategoryId === 'teacher') {
                if (voices.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center p-10 font-bold text-gray-400">せんせいを よみこみちゅう...</div>';
                    return;
                }
                voices.forEach((v, i) => {
                    const name = customVoiceNames[v.name] || getDefaultName(v, i);
                    const isSelected = selectedVoiceIndex === i;
                    const card = document.createElement('div');
                    card.className = `${isSelected ? 'bg-blue-600 text-white shadow-inner scale-95' : 'bg-white text-blue-600'} border-2 border-blue-200 rounded-2xl p-4 flex flex-col items-center justify-center gap-2 transition-all cursor-pointer relative`;
                    card.innerHTML = `
                        <div onclick="selectVoice(${i})" class="flex-1 flex flex-col items-center justify-center w-full">
                            <span class="text-4xl">👤</span>
                            <span class="text-lg font-bold text-center">${name}</span>
                        </div>
                        <button onclick="openVoiceModal(${i})" class="absolute top-2 right-2 p-2 bg-gray-100 rounded-full text-gray-500 hover:text-blue-600">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                    `;
                    grid.appendChild(card);
                });
            } else {
                const filtered = phrases.filter(p => p.cat === currentCategoryId);
                const catInfo = categories.find(c => c.id === currentCategoryId);
                grid.innerHTML = filtered.map(p => `
                    <div onclick="addPhrase('${p.text}', '${catInfo.textBtn}')" 
                         class="${catInfo.textBtn} border-2 rounded-2xl p-6 flex flex-col items-center justify-center gap-3 shadow-sm active:scale-95 transition-transform cursor-pointer min-h-[140px]">
                        <span class="text-5xl">${p.icon}</span>
                        <span class="text-xl font-bold text-gray-800 text-center">${p.text}</span>
                    </div>
                `).join('');
            }
        }

        function selectVoice(index) {
            selectedVoiceIndex = index;
            const name = customVoiceNames[voices[index].name] || getDefaultName(voices[index], index);
            renderContent();
            speak(name);
        }

        function openVoiceModal(index) {
            editingVoiceIndex = index;
            const currentName = customVoiceNames[voices[index].name] || getDefaultName(voices[index], index);
            document.getElementById('voice-name-input').value = currentName;
            document.getElementById('voice-modal').classList.remove('hidden');
        }

        function closeVoiceModal() {
            document.getElementById('voice-modal').classList.add('hidden');
        }

        function saveVoiceName() {
            const newName = document.getElementById('voice-name-input').value;
            if (newName.trim() && editingVoiceIndex !== null) {
                customVoiceNames[voices[editingVoiceIndex].name] = newName;
                renderContent();
                speak(newName);
            }
            closeVoiceModal();
        }

        function addPhrase(text, colorClass) {
            selectedPhrases.push({ text, colorClass });
            updateDisplay();
            speak(text);
        }

        function addChar(char) {
            const last = selectedPhrases[selectedPhrases.length - 1];
            if (last && last.isManual) {
                last.text += char;
            } else {
                selectedPhrases.push({ text: char, colorClass: 'bg-gray-100 border-gray-300', isManual: true });
            }
            updateDisplay();
        }

        function removeTag(index) {
            selectedPhrases.splice(index, 1);
            updateDisplay();
        }

        function removeLastTag() {
            selectedPhrases.pop();
            updateDisplay();
        }

        function clearAll() {
            selectedPhrases = [];
            updateDisplay();
        }

        function updateDisplay() {
            const area = document.getElementById('display-area');
            area.innerHTML = selectedPhrases.map((p, i) => `
                <div class="phrase-tag ${p.colorClass}">
                    <span>${p.text}</span>
                    <button onclick="event.stopPropagation(); removeTag(${i})" class="ml-1 text-gray-400 hover:text-red-500 font-bold">✕</button>
                </div>
            `).join('');
        }

        function speakAll() {
            const text = selectedPhrases.map(p => p.text).join('');
            if (text) speak(text);
        }

        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const uttr = new SpeechSynthesisUtterance(text);
            if (voices.length > 0) {
                uttr.voice = voices[selectedVoiceIndex];
            }
            uttr.lang = 'ja-JP';
            uttr.rate = 1.0;
            window.speechSynthesis.speak(uttr);
        }

        function renderKana() {
            const grid = document.getElementById('kana-grid');
            const source = (keyboardMode === 'standard') ? kanaStandard : kanaDakuon;
            grid.style.gridTemplateColumns = `repeat(${source.length}, 1fr)`;
            let html = '';
            source.forEach(column => {
                html += `<div class="kana-col">`;
                column.forEach(char => {
                    html += `<button onclick="addChar('${char}')" class="kana-key">${char}</button>`;
                });
                if (column.length < 5) {
                    for(let i=0; i < 5 - column.length; i++) html += `<div class="kana-key-empty"></div>`;
                }
                html += `</div>`;
            });
            grid.innerHTML = html;
        }

        function toggleKeyboardMode(mode) {
            keyboardMode = mode;
            const btnStd = document.getElementById('mode-std');
            const btnDaku = document.getElementById('mode-daku');
            btnStd.className = mode === 'standard' ? "px-6 py-2 bg-blue-600 text-white rounded-full font-bold" : "px-6 py-2 bg-gray-200 rounded-full font-bold";
            btnDaku.className = mode === 'dakuon' ? "px-6 py-2 bg-blue-600 text-white rounded-full font-bold" : "px-6 py-2 bg-gray-200 rounded-full font-bold";
            renderKana();
        }

        function toggleKeyboard(show) {
            const kb = document.getElementById('kana-keyboard');
            const grid = document.getElementById('content-grid');
            const toggleBtn = document.getElementById('keyboard-toggle-btn');
            if (show) {
                kb.classList.remove('hidden');
                grid.classList.add('hidden');
                toggleBtn.innerText = "カードに もどる";
                toggleBtn.onclick = () => toggleKeyboard(false);
            } else {
                kb.classList.add('hidden');
                grid.classList.remove('hidden');
                toggleBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>もじで にゅうりょく する`;
                toggleBtn.onclick = () => toggleKeyboard(true);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
